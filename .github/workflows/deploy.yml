name: Deploy to GitHub Pages

on:
  push:
    branches: 'main' # 👈 Triggers every single time you edit or commit a file here

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Base
        uses: actions/checkout@v4

      - name: Set up Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Project Dependencies
        run: npm install

      - name: Compile Production Build Assets
        run: npm run build

      - name: Push Compiled Code to GitHub Pages Branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # Vite compiles into 'dist' folder automatically
          branch: gh-pages # The automated code gets stored here
